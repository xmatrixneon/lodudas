# ==========================================
# Nginx Micro-Caching Configuration
# Add this to /etc/nginx/nginx.conf in the http {} block
# After "proxy_temp_file_write_size 64k;" line
# ==========================================

# Cache zone for API responses - 500MB for fast responses
proxy_cache_path /var/cache/nginx/api_cache
	levels=1:2
	keys_zone=api_cache:50m
	max_size=500m
	inactive=10m
	use_temp_path=off;

# Cache zone for static data - 1GB
proxy_cache_path /var/cache/nginx/static_cache
	levels=1:2
	keys_zone=static_cache:100m
	max_size=1g
	inactive=1h
	use_temp_path=off;

# Map to skip caching for specific requests
map $request_uri $cache_bypass {
	default 0;
	~* /gateway 1; # Skip WebSocket
	~* /api/login 1; # Skip auth
	~* /api/register 1; # Skip auth
	~* /api/mobile/login 1; # Skip auth
	~* /api/queues 1; # Skip admin
}
