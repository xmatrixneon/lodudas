# Nginx configuration for CattySMS Gateway - cryptix-syncnode.shop
# Handles Next.js static files, WebSocket, and PHP API

server {
    listen 80;
    listen [::]:80;
    server_name cryptix-syncnode.shop;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Client upload size
    client_max_body_size 20M;

    # Root directory for static files
    root /var/www/sunmine/.next;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # ==========================================
    # Next.js Static Files
    # ==========================================
    location /_next/static {
        alias /var/www/sunmine/.next/static;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location /static {
        alias /var/www/sunmine/public/static;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location /favicon.ico {
        alias /var/www/sunmine/public/favicon.ico;
        expires 365d;
        access_log off;
    }

    # ==========================================
    # WebSocket Gateway
    # ==========================================
    location /gateway {
        proxy_pass http://localhost:3000/gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }

    # ==========================================
    # Next.js API Routes
    # ==========================================
    location /api/ {
        proxy_pass http://localhost:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ==========================================
    # PHP Stubs API
    # ==========================================
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/stubs/$fastcgi_script_name;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 16 16k;
        fastcgi_read_timeout 60s;
    }

    # ==========================================
    # Next.js Pages (fallback)
    # ==========================================
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ==========================================
    # Logging
    # ==========================================
    access_log /var/log/nginx/cryptix-syncnode.shop-access.log;
    error_log /var/log/nginx/cryptix-syncnode.shop-error.log;
}
