# ==========================================
# Add this inside each server {} block for cattysms.shop
# Inside the location / {} block, add proxy_cache directives
# ==========================================

# For overview API - 5 second cache
location /api/overview/data {
	proxy_pass http://localhost:3000;
	proxy_http_version 1.1;
	proxy_set_header Upgrade $http_upgrade;
	proxy_set_header Connection "upgrade";
	proxy_set_header Host $host;
	proxy_set_header X-Real-IP $remote_addr;
	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	proxy_set_header X-Forwarded-Proto https;

	# Micro-caching
	proxy_cache api_cache;
	proxy_cache_valid 200 5s;
	proxy_cache_key "$scheme$request_method$host$request_uri";
	proxy_cache_bypass $cache_bypass;
	proxy_no_cache $cache_bypass;
	add_header X-Cache-Status $upstream_cache_status;
}

# For services/countries - 60 second cache
location ~ ^/api/(services|countries)/all {
	proxy_pass http://localhost:3000;
	proxy_http_version 1.1;
	proxy_set_header Upgrade $http_upgrade;
	proxy_set_header Connection "upgrade";
	proxy_set_header Host $host;
	proxy_set_header X-Real-IP $remote_addr;
	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	proxy_set_header X-Forwarded-Proto https;

	# Micro-caching
	proxy_cache static_cache;
	proxy_cache_valid 200 60s;
	proxy_cache_key "$scheme$request_method$host$request_uri";
	proxy_cache_bypass $cache_bypass;
	proxy_no_cache $cache_bypass;
	add_header X-Cache-Status $upstream_cache_status;
}
